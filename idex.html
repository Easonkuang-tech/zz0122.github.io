<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studley - 用 AI 更聪明地学习</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center font-sans">
  <div class="max-w-md w-full mx-auto p-6">
    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-3xl mb-3">
        📚
      </div>
      <h1 class="text-4xl font-bold text-gray-900">Studley</h1>
      <p class="text-gray-600 mt-1">用 AI 更聪明地学习</p>
    </div>

    <!-- 登录卡片 -->
    <div class="bg-white rounded-3xl shadow-xl p-8">
      <h2 class="text-2xl font-semibold text-center mb-6">欢迎回来</h2>
      
      <div class="space-y-5">
        <!-- 邮箱 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
          <input type="email" 
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500"
                 placeholder="your@email.com" value=>
        </div>

        <!-- 密码 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
          <input type="password" 
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500"
                 placeholder="••••••••">
        </div>

        <!-- 登录按钮 -->
        <button onclick="alert('登录成功！（演示）')"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3.5 rounded-2xl transition">
          登录
        </button>

        <!-- 分割线 -->
        <div class="relative flex items-center justify-center my-4">
          <div class="border-t border-gray-300 w-full"></div>
          <span class="bg-white px-4 text-sm text-gray-500">或</span>
        </div>

        <!-- Google 登录 -->
        <button class="w-full border border-gray-300 hover:bg-gray-50 font-medium py-3.5 rounded-2xl flex items-center justify-center gap-3 transition">
          <img src="https://www.google.com/favicon.ico" alt="Google" class="w-5 h-5">
          用 Google 登录
        </button>
      </div>

      <!-- 注册链接 -->
      <p class="text-center text-sm text-gray-600 mt-8">
        还没有账号？ 
        <a href="#" class="text-blue-600 hover:underline font-medium">立即注册</a>
      </p>
    </div>

    <p class="text-center text-xs text-gray-500 mt-8">
      © 2026 Studley AI - 让学习更简单
    </p>
  </div>
</body>
</html>
</div>
